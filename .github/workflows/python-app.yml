# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python bs daily klines

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install baostock pyarrow modelscope
    - name: Download bs data
      run: |
        YEAR=$(date +%Y)
        MONTH=$(date +%m)
        FIRST_DAY="${YEAR}-${MONTH}-01"

        if [ $MONTH -eq 12 ]; then
            NEXT_MONTH_FIRST="${YEAR}-$((YEAR+1))-01-01"
        else
            NEXT_MONTH_FIRST="${YEAR}-$(printf "%02d" $((10#$MONTH + 1)))-01"
        fi

        LAST_DAY=$(date -d "$NEXT_MONTH_FIRST -1 day" +%Y-%m-%d)
        python baostock_data.py basic --upload --repo-id=jzhongsun/novas-data-bs
        python baostock_data.py klines --start-date=$FIRST_DAY  --end-date=$LAST_DAY --upload --repo-id=jzhongsun/novas-data-bs --workers=1
      env:
        MODELSCOPE_ACCESS_TOKEN: ${{ secrets.MS_TOKEN }}
